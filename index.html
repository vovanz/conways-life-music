<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conway's Life Music</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    #ui {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      font-family: monospace;
      color: #ccc;
      user-select: none;
    }

    .bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(20, 20, 20, 0.92);
      border: 1px solid #3a3a3a;
      border-radius: 7px;
      padding: 0.45rem 1rem;
    }

    .sep {
      width: 1px;
      height: 1.2em;
      background: #3a3a3a;
      margin: 0 0.1rem;
    }

    button, select {
      background: #252525;
      color: #ddd;
      border: 1px solid #484848;
      border-radius: 4px;
      padding: 0.25rem 0.55rem;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    button:hover, select:hover { background: #333; }
    button:disabled { opacity: 0.35; cursor: default; }
    button.active { background: #2a4a6a; border-color: #4a8abf; color: #9fd; }

    #bpmDisplay { width: 3ch; text-align: center; color: #eee; }
    .label { color: #666; font-size: 0.85rem; }

    #hint {
      position: fixed;
      top: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: monospace;
      font-size: 0.8rem;
      color: #555;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hint"></div>

  <div id="ui">
    <!-- Transport + sound -->
    <div class="bar">
      <button id="playBtn">▶</button>
      <div class="sep"></div>
      <span class="label">BPM</span>
      <button id="bpmDown">−</button>
      <span id="bpmDisplay">240</span>
      <button id="bpmUp">+</button>
      <div class="sep"></div>
      <span class="label">Sound</span>
      <select id="soundSelect"></select>
      <div class="sep"></div>
      <span class="label">Scale</span>
      <select id="scaleSelect"></select>
      <div class="sep"></div>
      <button id="clearBtn" disabled>Clear</button>
    </div>

    <!-- Shape placement -->
    <div class="bar" id="shapesBar">
      <span class="label">Place</span>
      <div id="shapeButtons" style="display:flex;gap:0.4rem;flex-wrap:wrap;"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
