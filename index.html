<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conway's Life Music</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    /* ── Shared bar styles ── */
    .bar {
      position: fixed;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(20, 20, 20, 0.92);
      border: 1px solid #3a3a3a;
      border-radius: 7px;
      padding: 0.45rem 1rem;
      font-family: monospace;
      color: #ccc;
      user-select: none;
    }

    .sep { background: #3a3a3a; flex-shrink: 0; }

    /* ── Landscape: bar1 left, bar2 right, column layout ── */
    body.landscape #bar1 {
      left: 1rem; right: auto; top: 50%; bottom: auto;
      transform: translateY(-50%);
      flex-direction: column; align-items: stretch;
      max-height: calc(100vh - 2rem); overflow-y: auto;
      max-width: none; width: auto;
    }
    body.landscape #bar2 {
      right: 1rem; left: auto; top: 50%; bottom: auto;
      transform: translateY(-50%);
      flex-direction: column; align-items: stretch;
      max-height: calc(100vh - 2rem); overflow-y: auto;
      max-width: none; width: auto;
    }
    body.landscape .sep { width: auto; height: 1px; margin: 0.1rem 0; }

    /* ── Portrait: bar1 top, bar2 bottom, row layout ── */
    body.portrait #bar1 {
      top: 1rem; bottom: auto; left: 1rem; right: 1rem;
      transform: none;
      flex-direction: row; flex-wrap: wrap; justify-content: center;
      max-width: none; width: auto; max-height: none;
    }
    body.portrait #bar2 {
      bottom: 1rem; top: auto; left: 1rem; right: 1rem;
      transform: none;
      flex-direction: row; flex-wrap: wrap; justify-content: center;
      max-width: none; width: auto; max-height: none;
    }
    body.portrait .sep { width: 1px; height: 1.2em; margin: 0 0.1rem; }

    /* ── Controls ── */
    button, select {
      background: #252525;
      color: #ddd;
      border: 1px solid #484848;
      border-radius: 4px;
      padding: 0.25rem 0.55rem;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    button:hover, select:hover { background: #333; }
    #rotateCCWBtn, #rotateCWBtn { font-size: large; font-family: Arial; color: white; }
    button:disabled { opacity: 0.35; cursor: default; }
    button.active { background: #2a4a6a; border-color: #4a8abf; color: #9fd; }

    #bpmDisplay { width: 3ch; text-align: center; color: #eee; }
    .tab-group { display: flex; }
    .tab-group button { border-radius: 0; border-right-width: 0; flex: 1; }
    .tab-group button:first-child { border-radius: 4px 0 0 4px; }
    .tab-group button:last-child  { border-radius: 0 4px 4px 0; border-right-width: 1px; }
    .label { color: #666; font-size: 0.85rem; }

    #shapeButtons { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    body.landscape #shapeButtons { flex-direction: column; align-items: stretch; flex-wrap: nowrap; }
    body.portrait  #shapeButtons { flex-direction: row; flex-wrap: wrap; }

    #hint {
      position: fixed;
      top: 1.2rem; left: 50%; transform: translateX(-50%);
      font-family: monospace; font-size: 0.8rem;
      color: #555; pointer-events: none; white-space: nowrap;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hint"></div>

  <!-- Bar 1: transport + sound + scale + key -->
  <div id="bar1" class="bar">
    <button id="playBtn">▶</button>
    <div class="tab-group">
      <button id="nextGenBtn"   title="Skip to next generation">⏭</button>
      <button id="nextGenBtn2x" title="Fast-forward ×2">⏭×2</button>
      <button id="nextGenBtn4x" title="Fast-forward ×4">⏭×4</button>
    </div>
    <div class="sep"></div>
    <span class="label">BPM</span>
    <button id="bpmDown">−</button>
    <span id="bpmDisplay">240</span>
    <button id="bpmUp">+</button>
    <div class="sep"></div>
    <span class="label">Sound</span>
    <select id="soundSelect"></select>
    <div class="sep"></div>
    <span class="label">Scale</span>
    <select id="scaleSelect"></select>
    <div class="sep"></div>
    <span class="label">Key</span>
    <select id="keySelect"></select>
    <select id="octaveSelect"></select>
    <div class="sep"></div>
    <button id="clearBtn" disabled>Clear</button>
    <button id="randomBtn" disabled>Randomize</button>
  </div>

  <!-- Bar 2: mode + shapes + area selection -->
  <div id="bar2" class="bar">
    <div class="tab-group">
      <button id="dragModeBtn" class="active" title="Drag mode — drag to pan, click to toggle">🖐️</button>
      <button id="paintModeBtn" title="Paint mode — drag to paint, double-click to pan">🖌️</button>
    </div>
    <div class="tab-group">
      <button id="rotateCCWBtn" disabled title="Rotate counterclockwise">↺</button>
      <button id="rotateCWBtn"  disabled title="Rotate clockwise">↻</button>
    </div>
    <div class="sep"></div>
    <span class="label">Place</span>
    <div id="shapeButtons"></div>
    <div class="sep"></div>
    <button id="selectAreaBtn">Select area</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
